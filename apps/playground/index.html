<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rich-Text Editor Playground</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <h1>Markdown Editor Playground</h1>
        <span class="hint">Edit on the left — markdown source on the right</span>
      </header>
      <main class="split">
        <section id="editor" class="pane"></section>
        <section class="pane source">
          <pre><code id="source"></code></pre>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
